<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Injury Generator</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <style>
      :root {
        --gap: 1rem;
      }

      body {
        padding: 1rem;
      }
      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: var(--gap);
        align-items: start;
      }

      .controls {
        position: sticky;
        top: 1rem;
      }

      .stack {
        display: grid;
        gap: 0.75rem;
      }

      .result-header,
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .result-header {
        align-items: flex-start;
      }

      .result-header h2,
      .section-header strong,
      .section-header label {
        margin: 0;
      }

      .results {
        display: grid;
        gap: var(--gap);
      }

      .result-detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--gap);
      }

      .result-detail-block {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .result-detail-block p,
      .result-detail-block h3 {
        margin: 0;
      }

      .chipline {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .chip {
        display: inline-block;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        border: 1px solid var(--pico-muted-border-color);
        font-size: 0.78rem;
      }

      .muted {
        color: var(--pico-muted-color);
      }

      .empty {
        border: 1px dashed var(--pico-muted-border-color);
        border-radius: var(--pico-border-radius);
        padding: 1rem;
      }

      .linklike {
        border: 0;
        background: transparent;
        color: var(--pico-secondary);
        text-decoration: underline;
        padding: 0;
        margin: 0;
      }

      .icon-button {
        margin: 0;
        padding: 0.35rem 0.7rem;
        width: auto;
        min-width: 0;
      }

      .rule-list {
        margin: 0;
        padding-left: 1.25rem;
      }

      .rule-list li + li {
        margin-top: 0.25rem;
      }

      @media (max-width: 900px) {
        .layout,
        .result-detail-grid {
          grid-template-columns: 1fr;
        }

        .controls {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Injury Generator</h1>
      </header>

      <div class="layout">
        <aside class="controls">
          <article class="stack">
            <label for="attackType">
              Attack Type
              <select id="attackType" disabled>
                <option>Loading...</option>
              </select>
            </label>

            <label for="archetype">
              Archetype
              <select id="archetype" disabled>
                <option>Loading...</option>
              </select>
            </label>

            <label for="partSelect">
              Part
              <select id="partSelect" disabled>
                <option>Loading...</option>
              </select>
            </label>

            <details>
              <summary>Part Filters</summary>
              <div class="stack">
                <label for="exposureFilter">
                  Exposure
                  <select id="exposureFilter" disabled>
                    <option>Loading...</option>
                  </select>
                </label>

                <label for="hardnessFilter">
                  Hardness
                  <select id="hardnessFilter" disabled>
                    <option>Loading...</option>
                  </select>
                </label>

                <label for="materialFilter">
                  Material
                  <select id="materialFilter" disabled>
                    <option>Loading...</option>
                  </select>
                </label>

                <label for="systemFilter">
                  System
                  <select id="systemFilter" disabled>
                    <option>Loading...</option>
                  </select>
                </label>
              </div>
            </details>

            <div class="stack">
              <button id="generateBtn" disabled>Generate Injury</button>
              <button id="rerollBtn" class="secondary" disabled>
                Similar Roll
              </button>
              <button id="clearBtn" class="linklike" disabled>
                Clear Filters
              </button>
            </div>
          </article>
        </aside>

        <section class="results">
          <article id="resultCard">
            <header class="result-header">
              <div>
                <h2 id="resultTitle">Waiting for data...</h2>
                <p id="resultSubtitle" class="muted">No injury rolled yet.</p>
              </div>
              <button
                id="topRerollBtn"
                type="button"
                class="outline icon-button"
                aria-label="Reroll injury"
                title="Reroll injury"
                disabled
              >
                ↻
              </button>
            </header>
            <div id="resultBody" class="empty muted">
              The generator will roll a compatible injury here.
            </div>
          </article>

        </section>
      </div>
    </main>

    <script>
      const state = {
        data: null,
        partEntries: [],
        partsById: new Map(),
        lastResult: null,
      };

      const elements = {
        attackType: document.getElementById("attackType"),
        archetype: document.getElementById("archetype"),
        partSelect: document.getElementById("partSelect"),
        exposureFilter: document.getElementById("exposureFilter"),
        hardnessFilter: document.getElementById("hardnessFilter"),
        materialFilter: document.getElementById("materialFilter"),
        systemFilter: document.getElementById("systemFilter"),
        generateBtn: document.getElementById("generateBtn"),
        rerollBtn: document.getElementById("rerollBtn"),
        topRerollBtn: document.getElementById("topRerollBtn"),
        clearBtn: document.getElementById("clearBtn"),
        resultTitle: document.getElementById("resultTitle"),
        resultSubtitle: document.getElementById("resultSubtitle"),
        resultBody: document.getElementById("resultBody"),
      };

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };
          return map[char];
        });
      }

      function humanizeKey(value) {
        return String(value)
          .replace(/_/g, " ")
          .replace(/\b\w/g, (letter) => letter.toUpperCase());
      }

      function titleCase(value) {
        return String(value).replace(/\b\w/g, (letter) => letter.toUpperCase());
      }

      function capitalizeFirst(value) {
        const text = String(value);
        return text ? text.charAt(0).toUpperCase() + text.slice(1) : text;
      }

      function enableControls(enabled) {
        [
          elements.attackType,
          elements.archetype,
          elements.partSelect,
          elements.exposureFilter,
          elements.hardnessFilter,
          elements.materialFilter,
          elements.systemFilter,
          elements.generateBtn,
          elements.rerollBtn,
          elements.topRerollBtn,
          elements.clearBtn,
        ].forEach((node) => {
          node.disabled = !enabled;
        });
      }

      function setOptions(select, options, selectedValue = null) {
        select.innerHTML = options
          .map(
            (option) =>
              `<option value="${escapeHtml(option.value)}"${
                option.value === selectedValue ? " selected" : ""
              }>${escapeHtml(option.label)}</option>`,
          )
          .join("");
      }

      function flattenPartEntries(data) {
        const entries = [];
        Object.entries(data.body_parts).forEach(([archetypeKey, parts]) => {
          const archetypeLabel = humanizeKey(archetypeKey);
          Object.entries(parts).forEach(([partName, traits]) => {
            const id = `${archetypeKey}::${partName}`;
            const entry = {
              id,
              archetypeKey,
              archetypeLabel,
              partName,
              label: `${archetypeLabel} — ${titleCase(partName)}`,
              traits,
            };
            entries.push(entry);
          });
        });
        return entries.sort((a, b) => a.label.localeCompare(b.label));
      }

      function getTraitValues(entry, axis) {
        const value = entry.traits[axis];
        if (Array.isArray(value)) {
          return value;
        }
        if (value == null || value === "") {
          return [];
        }
        return [value];
      }

      function matchesAxisRule(entry, ruleKey, expectedValues) {
        const axis = ruleKey.replace(/_(any|none)$/, "");
        const partValues = getTraitValues(entry, axis);
        if (ruleKey.endsWith("_any")) {
          return expectedValues.some((value) => partValues.includes(value));
        }
        if (ruleKey.endsWith("_none")) {
          return expectedValues.every((value) => !partValues.includes(value));
        }
        return false;
      }

      function matchesRequirements(entry, rules = {}) {
        return Object.entries(rules).every(([ruleKey, expectedValues]) =>
          matchesAxisRule(entry, ruleKey, expectedValues),
        );
      }

      function getPreferenceMultiplier(entry, prefers = {}) {
        const matchedRules = Object.entries(prefers).filter(([ruleKey, values]) =>
          matchesAxisRule(entry, ruleKey, values),
        ).length;
        return 1 + matchedRules * 0.6;
      }

      function getCompatibleOutcomes(entry, attackKey) {
        if (!state.data || !entry || !attackKey) {
          return [];
        }
        const attack = state.data.attack_types[attackKey];
        if (!attack) {
          return [];
        }
        return attack.candidate_outcomes
          .map((outcomeKey) => {
            const definition = state.data.damage_outcomes[outcomeKey];
            if (!definition || !matchesRequirements(entry, definition.requires)) {
              return null;
            }
            return {
              key: outcomeKey,
              label: titleCase(outcomeKey),
              weight: definition.weight || 1,
              adjustedWeight:
                (definition.weight || 1) *
                getPreferenceMultiplier(entry, definition.prefers),
              requires: definition.requires || {},
              prefers: definition.prefers || {},
            };
          })
          .filter(Boolean)
          .sort((a, b) => b.adjustedWeight - a.adjustedWeight || a.label.localeCompare(b.label));
      }

      function getInjuryOptions(entry, forcedAttackKey = null) {
        if (!entry) {
          return [];
        }

        const attackKeys = forcedAttackKey
          ? [forcedAttackKey]
          : getCompatibleAttackKeys(entry);

        return attackKeys.flatMap((attackKey) =>
          getCompatibleOutcomes(entry, attackKey).map((outcome) => ({
            entry,
            attackKey,
            outcome,
            weight: outcome.adjustedWeight,
          })),
        );
      }

      function getCompatibleAttackKeys(entry) {
        if (!state.data || !entry) {
          return [];
        }
        return Object.keys(state.data.attack_types).filter(
          (attackKey) => getCompatibleOutcomes(entry, attackKey).length > 0,
        );
      }

      function getSelectedAttackKey() {
        return elements.attackType.value === "random" ? null : elements.attackType.value;
      }

      function getSelectedPartEntry() {
        const value = elements.partSelect.value;
        if (!value || value === "random") {
          return null;
        }
        return state.partsById.get(value) || null;
      }

      function entryMatchesFilters(entry, attackKey = null) {
        if (elements.archetype.value !== "any" && entry.archetypeKey !== elements.archetype.value) {
          return false;
        }
        if (
          elements.exposureFilter.value !== "any" &&
          entry.traits.exposure !== elements.exposureFilter.value
        ) {
          return false;
        }
        if (
          elements.hardnessFilter.value !== "any" &&
          entry.traits.hardness !== elements.hardnessFilter.value
        ) {
          return false;
        }
        if (
          elements.materialFilter.value !== "any" &&
          !getTraitValues(entry, "materials").includes(elements.materialFilter.value)
        ) {
          return false;
        }
        if (
          elements.systemFilter.value !== "any" &&
          !getTraitValues(entry, "systems").includes(elements.systemFilter.value)
        ) {
          return false;
        }
        if (attackKey && getCompatibleOutcomes(entry, attackKey).length === 0) {
          return false;
        }
        return true;
      }

      function getFilteredParts(attackKey = null) {
        return state.partEntries.filter((entry) => entryMatchesFilters(entry, attackKey));
      }

      function pickWeighted(items, getWeight) {
        const total = items.reduce((sum, item) => sum + Math.max(0, getWeight(item)), 0);
        if (total <= 0) {
          return items[0] || null;
        }
        let roll = Math.random() * total;
        for (const item of items) {
          roll -= Math.max(0, getWeight(item));
          if (roll <= 0) {
            return item;
          }
        }
        return items[items.length - 1] || null;
      }

      function describeAttack(attackKey) {
        const attack = state.data.attack_types[attackKey];
        return attack ? attack.description : "";
      }

      function getInjuryPhrase(outcomeLabel, entry) {
        const preposition =
          entry.traits.exposure === "internal"
            ? entry.traits.hardness === "hard"
              ? "in"
              : "of"
            : entry.traits.hardness === "hard"
              ? "of"
              : "to";
        return `${capitalizeFirst(entry.archetypeLabel.toLowerCase())} entity - ${capitalizeFirst(
          outcomeLabel.toLowerCase(),
        )} ${preposition} the ${entry.partName}`;
      }

      function renderResult(result) {
        if (!result) {
          elements.resultTitle.textContent = "No valid injury";
          elements.resultSubtitle.textContent = "Adjust filters and try again.";
          elements.resultBody.className = "empty muted";
          elements.resultBody.innerHTML = "The current filters do not produce a compatible injury.";
          return;
        }

        const { entry, attackKey, outcome } = result;
        const phrase = getInjuryPhrase(outcome.label, entry);
        const partTraitChips = [
          `exposure: ${entry.traits.exposure}`,
          `hardness: ${entry.traits.hardness}`,
          ...getTraitValues(entry, "materials").map((value) => `material: ${value}`),
          ...getTraitValues(entry, "systems").map((value) => `system: ${value}`),
          ...getTraitValues(entry, "states").map((value) => `state: ${value}`),
        ];

        elements.resultTitle.textContent = phrase;
        elements.resultSubtitle.textContent = `${humanizeKey(attackKey).toLowerCase()} attack`;
        elements.resultBody.className = "";
        elements.resultBody.innerHTML = `
          <div class="result-detail-grid">
            <section class="result-detail-block">
              <h3>Damage Description</h3>
              <p class="muted">${escapeHtml(describeAttack(attackKey))}</p>
            </section>
            <section class="result-detail-block">
              <h3>Targeted Traits</h3>
              <div class="chipline">
                ${partTraitChips.map((chip) => `<span class="chip">${escapeHtml(chip)}</span>`).join("")}
              </div>
            </section>
          </div>
        `;
      }

      function rebuildPartSelect() {
        const previousValue = elements.partSelect.value;
        const fixedAttack = getSelectedAttackKey();
        const candidates = fixedAttack
          ? getFilteredParts(fixedAttack)
          : getFilteredParts().filter((entry) => getCompatibleAttackKeys(entry).length > 0);

        const options = [
          { value: "random", label: "Random matching part" },
          ...candidates.map((entry) => ({ value: entry.id, label: entry.label })),
        ];

        const nextValue = options.some((option) => option.value === previousValue)
          ? previousValue
          : "random";
        setOptions(elements.partSelect, options, nextValue);
      }

      function refreshViews() {
        rebuildPartSelect();
      }

      function resolveRollContext() {
        const selectedPart = getSelectedPartEntry();
        const selectedAttack = getSelectedAttackKey();

        let entry = selectedPart;
        if (!entry) {
          const candidates = selectedAttack
            ? getFilteredParts(selectedAttack)
            : getFilteredParts().filter((candidate) => getCompatibleAttackKeys(candidate).length > 0);
          entry = pickWeighted(candidates, () => 1);
        }
        if (!entry) {
          return null;
        }

        let attackKey = selectedAttack;
        if (!attackKey) {
          const compatibleAttackKeys = getCompatibleAttackKeys(entry);
          attackKey = pickWeighted(compatibleAttackKeys, () => 1);
        }
        if (!attackKey) {
          return null;
        }

        const outcomes = getCompatibleOutcomes(entry, attackKey);
        if (!outcomes.length) {
          return null;
        }

        const outcome = pickWeighted(outcomes, (item) => item.adjustedWeight);
        return { entry, attackKey, outcome, outcomes };
      }

      function generateInjury() {
        const result = resolveRollContext();
        state.lastResult = result;
        renderResult(result);
      }

      function rerollSimilarInjury() {
        const currentEntry = state.lastResult && state.lastResult.entry;
        if (!currentEntry) {
          generateInjury();
          return;
        }

        const forcedAttackKey = getSelectedAttackKey();
        let candidateEntries = state.partEntries.filter(
          (entry) =>
            entry.archetypeKey === currentEntry.archetypeKey &&
            entryMatchesFilters(entry, forcedAttackKey),
        );

        if (!candidateEntries.length) {
          candidateEntries = state.partEntries.filter(
            (entry) =>
              entry.archetypeKey === currentEntry.archetypeKey &&
              (!forcedAttackKey || getCompatibleOutcomes(entry, forcedAttackKey).length > 0),
          );
        }

        const options = candidateEntries.flatMap((entry) =>
          getInjuryOptions(entry, forcedAttackKey),
        );
        if (!options.length) {
          generateInjury();
          return;
        }

        const previousSignature =
          state.lastResult && state.lastResult.outcome
            ? `${state.lastResult.entry.id}::${state.lastResult.attackKey}::${state.lastResult.outcome.key}`
            : null;

        let pool = options;
        if (previousSignature) {
          const alternatives = options.filter(
            (option) =>
              `${option.entry.id}::${option.attackKey}::${option.outcome.key}` !==
              previousSignature,
          );
          if (alternatives.length) {
            pool = alternatives;
          }
        }

        const next = pickWeighted(pool, (item) => item.weight);
        const outcomes = getCompatibleOutcomes(next.entry, next.attackKey);
        state.lastResult = {
          entry: next.entry,
          attackKey: next.attackKey,
          outcome: next.outcome,
          outcomes,
        };
        renderResult(state.lastResult);
      }

      function populateStaticControls() {
        setOptions(
          elements.attackType,
          [
            { value: "random", label: "Random attack type" },
            ...Object.keys(state.data.attack_types).map((key) => ({
              value: key,
              label: humanizeKey(key),
            })),
          ],
          "random",
        );

        setOptions(
          elements.archetype,
          [
            { value: "any", label: "Any archetype" },
            ...Object.keys(state.data.body_parts).map((key) => ({
              value: key,
              label: humanizeKey(key),
            })),
          ],
          "any",
        );

        setOptions(
          elements.exposureFilter,
          [
            { value: "any", label: "Any exposure" },
            ...state.data.part_trait_axes.exposure.map((value) => ({
              value,
              label: titleCase(value),
            })),
          ],
          "any",
        );

        setOptions(
          elements.hardnessFilter,
          [
            { value: "any", label: "Any hardness" },
            ...state.data.part_trait_axes.hardness.map((value) => ({
              value,
              label: titleCase(value),
            })),
          ],
          "any",
        );

        setOptions(
          elements.materialFilter,
          [
            { value: "any", label: "Any material" },
            ...state.data.part_trait_axes.materials.map((value) => ({
              value,
              label: humanizeKey(value),
            })),
          ],
          "any",
        );

        setOptions(
          elements.systemFilter,
          [
            { value: "any", label: "Any system" },
            ...state.data.part_trait_axes.systems.map((value) => ({
              value,
              label: humanizeKey(value),
            })),
          ],
          "any",
        );

        rebuildPartSelect();
      }

      function bindEvents() {
        [
          elements.attackType,
          elements.archetype,
          elements.exposureFilter,
          elements.hardnessFilter,
          elements.materialFilter,
          elements.systemFilter,
        ].forEach((node) => {
          node.addEventListener("change", refreshViews);
        });

        elements.partSelect.addEventListener("change", () => {
        });
        elements.generateBtn.addEventListener("click", generateInjury);
        elements.rerollBtn.addEventListener("click", rerollSimilarInjury);
        elements.topRerollBtn.addEventListener("click", rerollSimilarInjury);

        elements.clearBtn.addEventListener("click", () => {
          elements.attackType.value = "random";
          elements.archetype.value = "any";
          elements.exposureFilter.value = "any";
          elements.hardnessFilter.value = "any";
          elements.materialFilter.value = "any";
          elements.systemFilter.value = "any";
          refreshViews();
        });

      }

      function loadData() {
        const node = document.getElementById("injuryData");
        if (!node) {
          throw new Error("Embedded injury data not found.");
        }
        return JSON.parse(node.textContent);
      }

      function init() {
        try {
          state.data = loadData();
          state.partEntries = flattenPartEntries(state.data);
          state.partsById = new Map(state.partEntries.map((entry) => [entry.id, entry]));
          populateStaticControls();
          bindEvents();
          enableControls(true);
          refreshViews();
          generateInjury();
        } catch (error) {
          renderResult(null);
          elements.resultTitle.textContent = "Could not load embedded data";
          elements.resultSubtitle.textContent = error.message;
        }
      }

      init();
    </script>
