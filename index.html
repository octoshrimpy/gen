<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>octoshrimpy</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
      }

      main {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      h1 {
        margin-bottom: 6rem;
        margin-top: -6rem;
      }

      .home-card {
        width: min(52rem, 100%);
      }

      nav {
        width: min(52rem, 100%);
      }

      nav ul {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.75rem;
        padding-left: 0;
        margin: 0;
        width: 100%;
      }

      nav ul li {
        list-style: none;
        text-wrap: nowrap;
        flex: 0 0 12rem;
      }

      nav a[role="button"] {
        display: block;
        width: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
        <h1>hello, i'm octoshrimpy</h1>
        <nav>
          <ul>
            <li><a href="./tea" role="button">tea</a></li>
            <li><a href="./injury" role="button">injury</a></li>
            <li><a href="./name" role="button">name</a></li>
            <li><a href="./triune-character" role="button">triune-character</a></li>
            <li><a href="/worldslice" role="button">worldslice</a></li>
          </ul>
        </nav>
    </main>
  </body>
</html>
