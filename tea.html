<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tea Generator</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <style>
      :root {
        --gap: 1rem;
      }

      body {
        padding: 1rem;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: var(--gap);
        align-items: start;
      }

      .controls {
        position: sticky;
        top: 1rem;
      }

      .stack {
        display: grid;
        gap: 0.75rem;
      }

      .result-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .option-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
        gap: 0.4rem 0.75rem;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .section-header label {
        margin: 0;
        min-width: 18rem;
      }

      .section-header input {
        margin: 0;
      }

      .checkbox-list {
        max-height: 16rem;
        overflow: auto;
        padding-right: 0.25rem;
      }

      .icon-button {
        margin: 0;
        padding: 0.35rem 0.7rem;
        width: auto;
        min-width: 0;
      }

      #status {
        position: absolute;
        right: 1rem;
        top: 2.5rem;
      }

      button {
        white-space: nowrap;
      }

      .muted {
        color: var(--pico-muted-color);
      }

      .empty {
        border: 1px dashed var(--pico-muted-border-color);
        border-radius: var(--pico-border-radius);
        padding: 1rem;
      }

      #resultCard {
        flex: 1;
      }

      .split {
        display: grid;
        gap: 2rem;
        grid-template-columns: 3fr 2fr;
        grid-template-areas: 
          "plant parts"
          "appearance flavor"
          "why adds"
      }

      .match-list {
        columns: 2;
        column-gap: 1rem;
      }

      .match-list li {
        break-inside: avoid;
        margin-bottom: 0.35rem;
      }

      .match-link {
        background: none;
        border: 0;
        color: inherit;
        font: inherit;
        margin: 0;
        padding: 0;
        text-align: left;
        width: auto;
      }

      .match-link:hover,
      .match-link:focus {
        color: var(--pico-primary);
      }

      .match-link.is-active {
        color: var(--pico-primary);
        font-weight: 600;
      }

      .results {
        display: flex;
        gap: 0.75rem;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .controls {
          position: static;
        }

        .match-list {
          columns: 1;
        }
      }

      button.linklike {
        border: unset;
          --pico-background-color: transparent;
          --pico-color: var(--pico-secondary);
        display: inline;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Tea Generator</h1>
        <p id="status" class="muted" aria-live="polite">Preparing tea data...</p>
      </header>

      <div class="layout">
        <aside class="controls">
          <article class="stack">
            <label for="temperature">
              Tea style
              <select id="temperature">
                <option value="any">Any</option>
                <option value="warm">Warm</option>
                <option value="iced">Iced</option>
              </select>
            </label>

            <details open>
              <summary>Parts used</summary>
              <fieldset role="group" class="">
                <label>
                  <input type="radio" name="partsMode" value="any" checked />
                  Any of
                </label>
                <label>
                  <input type="radio" name="partsMode" value="all" />
                  All of
                </label>
              </fieldset>
              <div id="partsFilters" class="option-grid checkbox-list"></div>
            </details>

            <details>
              <summary>Flavours</summary>
              <fieldset role="group" >
                <label>
                  <input type="radio" name="flavourMode" value="any" checked />
                  Any of
                </label>
                <label>
                  <input type="radio" name="flavourMode" value="all" />
                  All of
                </label>
              </fieldset>
              <div id="flavourFilters" class="option-grid checkbox-list"></div>
            </details>

            <div class="stack">
              <button id="generateBtn">Generate Tea</button>
              <button id="clearBtn" class="linklike">Clear Filters</button>
            </div>
          </article>
        </aside>

        <section class="results">
          <article id="resultCard">
            <header>
              <div class="result-header">
                <strong id="resultTitle">Waiting for data...</strong>
                <button
                  id="rerollBtn"
                  type="button"
                  class="outline icon-button"
                  aria-label="Reroll tea"
                  title="Reroll tea"
                >
                  ↻
                </button>
              </div>
            </header>
            <div id="resultBody" class="empty muted">
              The generator will show a random tea here.
            </div>
          </article>

          <article>
            <header class="section-header">
              <strong>Matching Pool</strong>
              <label for="search">
                <input
                  id="search"
                  type="search"
                  placeholder="Search matching teas"
                />
              </label>
            </header>
            <p class="muted">
              <span id="matchCount">0</span> teas match the current filters.
            </p>
            <details>
              <summary>Show matching items</summary>
              <ul id="matchList" class="match-list"></ul>
            </details>
          </article>
        </section>
      </div>
    </main>

      const elements = {
        temperature: document.querySelector("#temperature"),
        search: document.querySelector("#search"),
        partsFilters: document.querySelector("#partsFilters"),
        flavourFilters: document.querySelector("#flavourFilters"),
        generateBtn: document.querySelector("#generateBtn"),
        rerollBtn: document.querySelector("#rerollBtn"),
        clearBtn: document.querySelector("#clearBtn"),
        status: document.querySelector("#status"),
        resultTitle: document.querySelector("#resultTitle"),
        resultBody: document.querySelector("#resultBody"),
        matchCount: document.querySelector("#matchCount"),
        matchList: document.querySelector("#matchList"),
      };

      function titleCase(value) {
        return value.replace(/\b\w/g, (letter) => letter.toUpperCase());
      }

      function getKindSymbol(kind) {
        return kind === "iced" ? "🧊" : "🔥";
      }

      function getPartIcon(part) {
        const iconMap = {
          berries: "🫐",
          blossoms: "🌸",
          buds: "🌱",
          calyces: "🌺",
          flowers: "🌼",
          fruit: "🍎",
          hips: "🌹",
          leaves: "🍃",
          petals: "🌸",
          rhizomes: "🫚",
          roots: "🥕",
          seeds: "🌰",
          stalks: "🎋",
          stems: "🌿",
          tendrils: "🪴",
          "young leaves": "🌿",
        };

        return iconMap[part] ?? "🌿";
      }

      function formatPartsUsed(parts) {
        if (parts.length === 0) {
          return "Not available";
        }

        return parts
          .map((part) => `${getPartIcon(part)} ${part}`)
          .join(", ");
      }

      function createCheckbox(name, value) {
        const label = document.createElement("label");
        const input = document.createElement("input");
        const text = document.createElement("span");

        input.type = "checkbox";
        input.name = name;
        input.value = value;
        input.checked = true;
        text.textContent = titleCase(value);

        label.append(input, text);
        return label;
      }

      function buildEntries(data) {
        const warmEntries = Object.entries(data.warm).map(([id, tea]) => ({
          key: `warm:${id}`,
          id,
          kind: "warm",
          item: tea.item,
          plantDesc: tea.plant_desc,
          partsUsed: tea.parts_used ?? [],
          appearance: tea.tea_appearance,
          flavour: tea.tea_flavour ?? [],
          notes: null,
          additions: [],
        }));

        const icedEntries = Object.entries(data.iced).map(([id, tea]) => {
          const baseTea = data.warm[tea.base_item_id] ?? {};
          return {
            key: `iced:${id}`,
            id,
            kind: "iced",
            item: tea.item,
            plantDesc: baseTea.plant_desc ?? "",
            partsUsed: baseTea.parts_used ?? [],
            appearance: tea.appearance,
            flavour: tea.flavour ?? [],
            notes: tea.why_good_iced ?? null,
            additions: tea.common_additions ?? [],
          };
        });

        return [...warmEntries, ...icedEntries];
      }

      function renderFilters(data) {
        elements.partsFilters.replaceChildren(
          ...data.parts.map((part) => createCheckbox("parts", part)),
        );
        elements.flavourFilters.replaceChildren(
          ...data.flavour.map((flavour) => createCheckbox("flavour", flavour)),
        );
      }

      function getCheckedValues(name) {
        return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(
          (input) => input.value,
        );
      }

      function getModeValue(name) {
        return (
          document.querySelector(`input[name="${name}"]:checked`)?.value ?? "any"
        );
      }

      function matchesSearch(entry, query) {
        if (!query) {
          return true;
        }

        const haystack = [
          entry.item,
          entry.kind,
          entry.plantDesc,
          entry.appearance,
          entry.notes,
          ...entry.partsUsed,
          ...entry.flavour,
          ...entry.additions,
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

        return haystack.includes(query);
      }

      function getMatches() {
        const temperature = elements.temperature.value;
        const query = elements.search.value.trim().toLowerCase();
        const selectedParts = getCheckedValues("parts");
        const selectedFlavours = getCheckedValues("flavour");
        const partsMode = getModeValue("partsMode");
        const flavourMode = getModeValue("flavourMode");

        return state.entries.filter((entry) => {
          if (temperature !== "any" && entry.kind !== temperature) {
            return false;
          }

          if (selectedParts.length > 0) {
            const partMatch =
              partsMode === "all"
                ? selectedParts.every((part) => entry.partsUsed.includes(part))
                : selectedParts.some((part) => entry.partsUsed.includes(part));

            if (!partMatch) {
              return false;
            }
          }

          if (selectedFlavours.length > 0) {
            const flavourMatch =
              flavourMode === "all"
                ? selectedFlavours.every((flavour) => entry.flavour.includes(flavour))
                : selectedFlavours.some((flavour) => entry.flavour.includes(flavour));

            if (!flavourMatch) {
              return false;
            }
          }

          return matchesSearch(entry, query);
        });
      }

      function renderMatches(matches) {
        elements.matchCount.textContent = String(matches.length);
        elements.matchList.replaceChildren(
          ...matches
            .slice()
            .sort((left, right) => left.item.localeCompare(right.item))
            .map((entry) => {
              const item = document.createElement("li");
              const button = document.createElement("button");
              button.type = "button";
              button.className = "match-link";
              if (entry.key === state.lastResultKey) {
                button.classList.add("is-active");
              }
              button.textContent = `${entry.item} ${getKindSymbol(entry.kind)}`;
              button.addEventListener("click", () => {
                renderResult(entry);
                renderMatches(matches);
              });
              item.append(button);
              return item;
            }),
        );
      }

      function renderResult(entry) {
        if (!entry) {
          state.lastResultKey = null;
          elements.resultTitle.textContent = "No matching tea";
          elements.resultBody.className = "empty muted";
          elements.resultBody.textContent =
            "Adjust the filters or clear them to widen the pool";
          return;
        }

        state.lastResultKey = entry.key;
        elements.resultTitle.textContent = `${entry.item} ${getKindSymbol(entry.kind)}`;
        elements.resultBody.className = "";

        const wrapper = document.createElement("div");
        wrapper.className = "stack";

        const split = document.createElement("div");
        split.className = "split";

        split.append(
          createBlock("Original plant", entry.plantDesc || "Not available", "plant"),
          createBlock("Parts used", formatPartsUsed(entry.partsUsed), "parts"),
          createBlock("Tea appearance", entry.appearance || "Not available", "appearance"),
          createBlock(
            "Flavour profile",
            entry.flavour.length > 0 ? entry.flavour.join(", ") : "Not available",
            "flavor"
          ),
        );

        if (entry.notes) {
          split.append(createBlock("Notes", entry.notes, "why"));
        }

        if (entry.additions.length > 0) {
          split.append(
            createBlock("Common additions", entry.additions.join(", "), "adds"),
          );
        }

        wrapper.append(split);
        elements.resultBody.replaceChildren(wrapper);
      }

      function createBlock(label, value, cssclass="") {
        const section = document.createElement("section");
        const heading = document.createElement("strong");
        const paragraph = document.createElement("p");

        heading.textContent = label;
        paragraph.textContent = value;
        paragraph.style.marginBottom = "0";

        cssclass && section.classList.add(cssclass);
        section.append(heading, paragraph);
        return section;
      }

      function roll(matches) {
        if (matches.length === 0) {
          renderResult(null);
          renderMatches(matches);
          elements.status.textContent = "No teas match the current filters";
          return;
        }

        const next = matches[Math.floor(Math.random() * matches.length)];
        renderResult(next);
        renderMatches(matches);
        elements.status.textContent = `Rolled 1 tea from ${matches.length} matches.`;
      }

      function updateMatches() {
        const matches = getMatches();

        if (matches.length === 0) {
          renderResult(null);
        } else if (!matches.some((entry) => entry.key === state.lastResultKey)) {
          renderResult(matches[0]);
        }

        renderMatches(matches);

        if (state.data) {
          elements.status.textContent = `${matches.length} teas available with the current filters.`;
        }
      }

      function resetFilters() {
        elements.temperature.value = "any";
        elements.search.value = "";
        document.querySelector('input[name="partsMode"][value="any"]').checked = true;
        document.querySelector('input[name="flavourMode"][value="any"]').checked = true;
        document
          .querySelectorAll('input[name="parts"], input[name="flavour"]')
          .forEach((input) => {
            input.checked = true;
          });
        state.lastResultKey = null;
        updateMatches();
      }

      function bindEvents() {
        if (state.eventsBound) {
          return;
        }

        state.eventsBound = true;
        elements.generateBtn.addEventListener("click", () => roll(getMatches()));
        elements.rerollBtn.addEventListener("click", () => roll(getMatches()));
        elements.clearBtn.addEventListener("click", resetFilters);
        elements.temperature.addEventListener("change", updateMatches);
        elements.search.addEventListener("input", updateMatches);
        document
          .querySelectorAll('input[name="partsMode"], input[name="flavourMode"]')
          .forEach((input) => input.addEventListener("change", updateMatches));
        elements.partsFilters.addEventListener("change", updateMatches);
        elements.flavourFilters.addEventListener("change", updateMatches);
      }

      function initialize(data) {
        state.data = data;
        state.entries = buildEntries(data);
        state.lastResultKey = null;
        renderFilters(data);
        updateMatches();
        roll(getMatches());
      }

      initialize(teaData);
      bindEvents();
    </script>
